[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

# Single-page-app fallback not needed (Astro builds static HTML for every route)
# but keep the 404 explicit:
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
